steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$$SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ynm-erp:$BUILD_ID \
          .
    secretEnv:
      - SUPABASE_URL
      - SUPABASE_ANON_KEY

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ynm-erp:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ynm-erp
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ynm-erp:$BUILD_ID
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-secrets=NEXT_PUBLIC_SUPABASE_URL=ynm-erp-supabase-url:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=ynm-erp-supabase-anon-key:latest,SUPABASE_SERVICE_ROLE_KEY=ynm-erp-supabase-service-role-key:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ynm-erp-supabase-url/versions/latest
      env: SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/ynm-erp-supabase-anon-key/versions/latest
      env: SUPABASE_ANON_KEY

options:
  logging: CLOUD_LOGGING_ONLY
